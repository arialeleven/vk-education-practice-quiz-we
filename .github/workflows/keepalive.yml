# Keeps the free Supabase project awake (it pauses after ~7 days of inactivity),
# so the "working product" link is live when reviewers open it.
name: keepalive
on:
  schedule:
    - cron: "0 6 */3 * *"   # every 3 days
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST
        run: |
          curl -s -o /dev/null -w "%{http_code}\n" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/profiles?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}"
